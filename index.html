<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two Stroke Works | Vintage Suzuki TS Restorations</title>
  <meta name="description" content="Two Stroke Works specializes in vintage Suzuki TS restorations, parts, and motorcycle builds in Flower Mound, Texas.">

  <link rel="preload" as="image" href="engine.jpg">

  <style>

  /* ===================== */
  /* BASE */
  /* ===================== */

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Georgia, serif;
    background: #090909;
    color: #fff;
  }

  a { color: inherit; text-decoration: none; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===================== */
  /* HEADER */
  /* ===================== */

  .nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 8px 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,.55),
      rgba(0,0,0,.15),
      rgba(0,0,0,0)
    );
    backdrop-filter: blur(4px);
    z-index: 10;
  }

  .nav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    height: 80px;
  }

  .nav-link {
    border: 1px solid rgba(255,255,255,.3);
    padding: 8px 16px;
    border-radius: 999px;
  }

  /* ===================== */
  /* HERO */
  /* ===================== */

  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-top: 120px;
    background:
      linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.6)),
      url("engine.jpg") center/cover no-repeat;
  }

  h1 {
    font-size: 72px;
    line-height: 1;
    margin: 0;
  }

  .red { color: #E20A17; }

  .hero-text {
    margin-top: 20px;
    max-width: 600px;
    opacity: .85;
  }

  .hero-actions {
    margin-top: 28px;
    display: flex;
    gap: 16px;
  }

  .btn {
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }

  .btn-primary {
    background: #E20A17;
    border: 1px solid #E20A17;
  }

  .btn-secondary {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.25);
  }

  .trust-line {
    margin-top: 20px;
    font-size: 13px;
    color: rgba(255,255,255,.78);
  }

  /* ===================== */
  /* GRID / CARDS */
  /* ===================== */

  .section {
    padding: 80px 0;
  }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .item-card {
    background: #111;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 20px;
    overflow: hidden;
  }

  .item-image {
    width: 100%;
    height: 240px;
    object-fit: cover;
  }

  .item-body {
    padding: 20px;
  }

  .item-title {
    margin: 10px 0;
  }

  /* ===================== */
  /* BUTTON PAIR */
  /* ===================== */

  .dual-actions {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }

  .dual-actions .btn {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 52px;
  }

  .btn-inquire {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.22);
  }

  /* ===================== */
  /* CONTACT */
  /* ===================== */

  .contact-value a {
    color: inherit;
  }

  @media (max-width: 768px) {
    .items-grid { grid-template-columns: 1fr; }
    h1 { font-size: 44px; }
    .hero-actions { flex-direction: column; }
  }

  </style>
</head>

<body>

<!-- ===================== -->
<!-- HEADER -->
<!-- ===================== -->
<div class="nav">
  <div class="container nav-inner">
    <div class="brand">
      <img src="logo.png" class="logo">
      <div>
        <div>Two Stroke Works</div>
        <div style="font-size:12px; opacity:.6;">Flower Mound, Texas</div>
      </div>
    </div>
    <a href="#contact" class="nav-link">Contact</a>
  </div>
</div>

<!-- ===================== -->
<!-- HERO -->
<!-- ===================== -->
<section class="hero">
  <div class="container">

    <h1>
      Preserving<br>
      <span class="red">Two-Stroke</span><br>
      History
    </h1>

    <div class="hero-text">
      Vintage Suzuki TS restorations, parts, and builds.
    </div>

    <div class="hero-actions">
      <a href="mailto:twostrokeworks@gmail.com" class="btn btn-primary">Email</a>
      <a href="#work" class="btn btn-secondary">View Work</a>
    </div>

    <p class="trust-line">
      Focused exclusively on vintage Suzuki TS restorations
    </p>

  </div>
</section>

<!-- ===================== -->
<!-- CURATED ITEMS -->
<!-- ===================== -->
<section class="section" id="work">
  <div class="container">

    <h2>Curated Items</h2>

    <div class="items-grid">

      <!-- ITEM -->
      <div class="item-card">
        <img src="pipes.jpg" class="item-image">

        <div class="item-body">
          <h3 class="item-title">Expansion Chambers</h3>

          <div class="dual-actions">

            <a href="https://buy.stripe.com/YOUR_LINK"
               class="btn btn-primary"
               target="_blank">
              Purchase
            </a>

            <a href="mailto:twostrokeworks@gmail.com?subject=Expansion%20Chambers%20Inquiry"
               class="btn btn-inquire">
              Inquire
            </a>

          </div>

        </div>
      </div>

    </div>

  </div>
</section>

<!-- ===================== -->
<!-- CONTACT -->
<!-- ===================== -->
<section class="section" id="contact">
  <div class="container">

    <h2>Contact</h2>

    <div class="contact-value">
      <a href="tel:2143948786">214-394-8786</a>
    </div>

    <div class="contact-value">
      <a href="mailto:twostrokeworks@gmail.com">
        twostrokeworks@gmail.com
      </a>
    </div>

  </div>
</section>

<!-- ===================== -->
<!-- SCRIPT -->
<!-- ===================== -->
<script>
  if ("scrollRestoration" in history) {
    history.scrollRestoration = "manual";
  }
  window.addEventListener("load", function () {
    window.scrollTo(0, 0);
  });
</script>

</body>
</html>
